# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
    -   id: trailing-whitespace
        exclude: (.local/bin/diff-so-fancy$|\.local/bin/_tkdiff-[0-9\.]*$)
    -   id: end-of-file-fixer
    -   id: check-yaml
        args: [--unsafe]
    -   id: check-json
    -   id: check-xml
    -   id: check-toml
    -   id: check-added-large-files
    -   id: check-case-conflict
    -   id: check-merge-conflict
    -   id: check-executables-have-shebangs
    -   id: detect-aws-credentials
        args: ["--allow-missing-credentials"]

- repo: https://github.com/Lucas-C/pre-commit-hooks
  rev: ad1b27d73581aa16cca06fc4a0761fc563ffe8e8  # frozen: v1.5.6
  hooks:
  - id: remove-tabs
    exclude: (Makefile$|\.bat$|\.cmake$|\.eps$|\.fits$|\.opt$|.local/bin/diff-so-fancy|\.gitconfig|\.local/bin/_tkdiff-[0-9\.]*$)

- repo: https://github.com/psf/black
  rev: c6755bb741b6481d6b3d3bb563c83fa060db96c9  # frozen: 26.3.1
  hooks:
  - id: black
    args: ["--line-length", "120"]

- repo: https://github.com/pycqa/isort
  rev: a333737ed43df02b18e6c95477ea1b285b3de15a  # frozen: 8.0.1
  hooks:
  - id: isort
    args: ["--profile", "black"]
    name: isort (python)
